<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OffMaps | Destinations</title>
  <meta name="description" content="Explore hidden destinations and unique stays with OffMaps.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="logo">
      <a href="index.html">
        <img src="images/offmapslogo.jpg" alt="OffMaps Logo">
        <span>OffMaps</span>
      </a>
    </div>

    <nav class="main-nav">
      <a href="destinations.html">Destinations</a>
      <a href="#">Premium Stays</a>
      <a href="#">Budget Stays</a>
      <a href="#">About</a>
    </nav>
  </header>

  <section class="destinations-page">
    <div class="destinations-overlay">

      <div class="destinations-top">
        <h1>Explore Destinations</h1>
        <div class="quiz-box">
          <p>Not sure where to go?</p>
          <a href="quiz.html" class="quiz-button">Start Free Quiz</a>
        </div>
      </div>

      <div class="continent-nav">
        <button class="continent-button" onclick="selectContinent(this)">All</button>
        <button class="continent-button" onclick="selectContinent(this)">Europe</button>
        <button class="continent-button" onclick="selectContinent(this)">Asia</button>
        <button class="continent-button" onclick="selectContinent(this)">Africa</button>
        <button class="continent-button" onclick="selectContinent(this)">South America</button>
        <button class="continent-button" onclick="selectContinent(this)">North America</button>
      </div>

      <div class="destination-grid">
        <div class="destination-card">
          <img src="images/ greecehome.jpg" alt="Greece stay">
          <a href="greece.html"><button type="button">View</button></a>
          <h3>Greece</h3>
        </div>

        <div class="destination-card">
          <img src="images/francehome.jpg" alt="France stay">
          <button type="button">View</button>
          <h3>France</h3>
        </div>

        <div class="destination-card">
          <img src="images/moroccohome.jpg" alt="Morocco stay">
          <button type="button">View</button>
          <h3>Morocco</h3>
        </div>

        <div class="destination-card">
          <img src="images/italy.jpg" alt="Italy stay">
          <button type="button">View</button>
          <h3>Italy</h3>
        </div>

        <div class="destination-card">
          <img src="images/spain.jpg" alt="Spain stay">
          <button type="button">View</button>
          <h3>Spain</h3>
        </div>

        <div class="destination-card">
          <img src="images/japan.jpg" alt="Japan stay">
          <button type="button">View</button>
          <h3>Japan</h3>
        </div>

        <div class="destination-card">
          <img src="images/ costarica.jpg" alt="Costa Rica stay">
          <button type="button">View</button>
          <h3>Costa Rica</h3>
        </div>

        <div class="destination-card">
          <img src="images/Hawaii.jpg" alt="Hawaii stay">
          <button type="button">View</button>
          <h3>Hawaii</h3>
        </div>

        <div class="destination-card">
          <img src="images/bali.jpg" alt="Bali stay">
          <button type="button">View</button>
          <h3>Bali</h3>
        </div>

      </div>

    </div>
  </section>

  <script>
    function selectContinent(element) {
      element.style.backgroundColor = "lightblue";
      element.style.color = "black";
    }
  </script>

</body>
</html>
