<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OffMaps | Travel Quiz</title>
  <meta name="description" content="Take our travel quiz to find your perfect destination.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="logo">
    <a href="index.html">
      <img src="images/offmapslogo.jpg">
      <span>ffMaps</span>
    </a>
  </div>

  <nav class="main-nav">
    <a href="destinations.html">Destinations</a>
    <a href="#">Premium Stays</a>
    <a href="#">Budget Stays</a>
    <a href="#">About</a>
  </nav>
</header>

<section class="quiz-hero">

  <div class="quiz-container">

    <div class="quiz-header">
      <h1>Find Your Ideal Getaway</h1>
      <p>Take our quiz to find the perfect destination tailored to your travel style</p>
    </div>

    <!-- QUESTION 1 -->
    <div class="quiz-question">
  <h2>1: What’s your vacation vibe?</h2>
  <div class="quiz-images">
    <button class="quiz-option" onclick="selectOption(this)">Beach</button>
    <button class="quiz-option" onclick="selectOption(this)">City</button>
    <button class="quiz-option" onclick="selectOption(this)">Nature</button>
  </div>
 </div>

    <!-- QUESTION 2 -->
    <div class="quiz-question">
  <h2>2: What’s your budget?</h2>
  <div class="quiz-buttons">
    <button class="quiz-option" onclick="selectOption(this)">Cheap</button>
    <button class="quiz-option" onclick="selectOption(this)">Mid-Range</button>
    <button class="quiz-option" onclick="selectOption(this)">Luxury</button>
  </div>
 </div>

    <!-- QUESTION 3 -->
    <div class="quiz-question">
  <h2>3: How do you like to travel?</h2>
  <div class="quiz-buttons">
    <button class="quiz-option" onclick="selectOption(this)">Relax</button>
    <button class="quiz-option" onclick="selectOption(this)">Explore</button>
    <button class="quiz-option" onclick="selectOption(this)">Adventure</button>
  </div>
 </div>

    <button id="quizSubmit" onclick="findStay()">Find My Stay</button>
 <p id="quizResult"></p>

  </div>

</section>
<script>
  function selectOption(element) {
    element.style.backgroundColor = "lightblue";
    element.style.border = "2px solid blue";
  }

  function findStay() {
    document.getElementById("quizResult").innerHTML = "We recommend Greece or Bali based on your vibe! 🌊";
  }
</script>
