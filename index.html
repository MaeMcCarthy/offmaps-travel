<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OffMaps | Hidden Stays</title>
  <meta name="description" content="Discover hidden stays in Greece, Italy, Morocco and France with OffMaps.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="logo">
      <img src="images/offmapslogo.jpg" alt="OffMaps Logo">
      <span>OffMaps</span>
    </div>

    <nav class="main-nav">
      <a href="destinations.html">Destinations</a>
      <a href="#">Premium Stays</a>
      <a href="#">Budget Stays</a>
      <a href="#">About</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-overlay">
      <div class="search-box">
        <h2>Find Your Stay</h2>

        <form id="stayForm" onsubmit="return searchStays()">
          <div class="form-row">
            <label for="destination">Destination</label>
            <select id="destination" name="destination" required>
              <option value="">Select Destination</option>
              <option value="Greece">Greece</option>
              <option value="Italy">Italy</option>
              <option value="Morocco">Morocco</option>
              <option value="France">France</option>
            </select>

            <label for="travelDate">Date</label>
            <input type="date" id="travelDate" name="travelDate" required>

            <label for="guests">Guests</label>
            <select id="guests" name="guests">
              <option value="">Guests</option>
              <option value="1">1 Guest</option>
              <option value="2">2 Guests</option>
              <option value="3">3 Guests</option>
              <option value="4">4+ Guests</option>
            </select>
          </div>

          <button type="submit">Discover Now</button>
        </form>

        <p id="formMessage"></p>
      </div>
    </div>
  </section>

  <section class="intro-section">
    <div class="intro-left">
      <h1>Go Beyond Destinations, Stay OffMap</h1>

      <div class="country-cards">
        <div class="country-card">
          <a href="greece.html">
            <h3>Greece</h3>
            <img src="images/ greecehome.jpg" alt="Greece stay">
          </a>
        </div>

        <div class="country-card">
          <a href="#">
            <h3>Italy</h3>
            <img src="images/italy.jpg" alt="Italy stay">
          </a>
        </div>

        <div class="country-card">
          <a href="#">
            <h3>Morocco</h3>
            <img src="images/moroccohome.jpg" alt="Morocco stay">
          </a>
        </div>

        <div class="country-card">
          <a href="#">
            <h3>France</h3>
            <img src="images/francehome.jpg" alt="France stay">
          </a>
        </div>
      </div>
    </div>

    <aside class="review-box">
      <h2>Read Our Customers' Recommendations</h2>
      <button onclick="showReview()">Show Review</button>
      <p id="reviewText"></p>
    </aside>
  </section>

  <script>
    function searchStays() {
      document.getElementById("formMessage").innerHTML = "Searching for your perfect stay...";
      return false;
    }

    function showReview() {
      document.getElementById("reviewText").innerHTML = "'OffMaps helped us find a hidden villa in Greece we never would have found on our own!' - Sarah J.";
    }
  </script>

</body>
</html>
